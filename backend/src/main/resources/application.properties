# ─── Database (PostgreSQL) ────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/zero2earn
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── If using MySQL instead, comment out above and uncomment:
# spring.datasource.url=jdbc:mysql://localhost:3306/zero2earn?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=YOUR_MYSQL_PASSWORD
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ─── Connection Pool (HikariCP) ────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ─── NO JPA / Hibernate ────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ─── JWT ───────────────────────────────────────────────────────
# Change this secret in production! Must be >= 256 bits for HS256
jwt.secret=zerotoearns3cr3tK3y!@#$2026ChangeThisInProductionPleaseUseALongRandomString
jwt.expiration=86400000

# ─── Server ────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ─── CORS ──────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── Logging ───────────────────────────────────────────────────
logging.level.com.zero2earn=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.jdbc=DEBUG

# ─── Jackson ───────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ─── Multipart (for future file uploads) ──────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
